spring:
  ai:
    ollama:
      base-url: ${machine.ai.ollama.base-url}
      chat:
        options:
          model: ${machine.ai.ollama.chat.options.model:deepseek-r1:8b}
    deepseek:
      api-key: ${machine.ai.deepseek.api-key}
      chat:
        options:
          model: ${machine.ai.deepseek.chat.options.model:deepseek-chat}
    zhipuai:
      api-key: ${machine.ai.zhipuai.api-key}
      embedding:
        options:
          model: embedding-3
      chat:
        options:
          model: ${machine.ai.zhipuai.chat.options.model:GLM-5}
    dashscope:
      api-key: ${machine.ai.dashscope.api-key}
      chat:
        options:
          model: ${machine.ai.dashscope.chat.options.model:qwen3.6-plus}